<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>GenAIUsageWidget</title>
<style>
  :root {
    color-scheme: light dark;

    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;

    --glass-card: rgba(255, 255, 255, 0.62);
    --glass-tile: rgba(255, 255, 255, 0.5);
    --glass-tile-hover: rgba(255, 255, 255, 0.68);
    --glass-border: rgba(255, 255, 255, 0.65);
    --glass-edge: rgba(11, 11, 11, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.8);

    --accent: #2a78d6;
    --warning: #fab219;
    --critical: #d03b3b;

    --id-claude: #4a3aa7;
    --id-codex: #1baf7a;
    --id-cursor: #e87ba4;
    --id-antigravity: #eb6834;

    --glow-opacity: 0.55;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;

      --glass-card: rgba(26, 26, 25, 0.62);
      --glass-tile: rgba(255, 255, 255, 0.055);
      --glass-tile-hover: rgba(255, 255, 255, 0.09);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-edge: rgba(0, 0, 0, 0.4);
      --glass-highlight: rgba(255, 255, 255, 0.12);

      --accent: #3987e5;
      --warning: #fab219;
      --critical: #d03b3b;

      --id-claude: #9085e9;
      --id-codex: #199e70;
      --id-cursor: #d55181;
      --id-antigravity: #d95926;

      --glow-opacity: 0.4;
    }
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body.widget-mode {
    background: transparent;
  }

  .app {
    position: relative;
    overflow: hidden;
    margin: 6px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    border-radius: 20px;
    background: var(--glass-card);
    border: 1px solid var(--glass-border);
    box-shadow:
      inset 0 1px 0 var(--glass-highlight),
      0 1px 2px var(--glass-edge),
      0 16px 40px -12px rgba(0, 0, 0, 0.3);
  }

  /* Colored glow blobs behind the frosted tiles — this is what the
     tiles' backdrop-filter actually blurs, since a transparent Electron
     window can't blur the desktop behind it. */
  .app-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: var(--glow-opacity);
  }

  .app-bg .blob {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    filter: blur(56px);
  }

  .app-bg .blob-1 { background: var(--id-claude);      top: -70px;  left: -60px; }
  .app-bg .blob-2 { background: var(--id-codex);       top: 120px;  right: -90px; }
  .app-bg .blob-3 { background: var(--id-antigravity); bottom: -80px; left: -30px; }

  .app > :not(.app-bg) {
    position: relative;
  }

  body.widget-mode .app-header {
    -webkit-app-region: drag;
    cursor: move;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 4px 2px;
    gap: 8px;
  }

  .app-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .app-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  .app-updated {
    font-size: 10px;
    color: var(--text-muted);
  }

  .settings-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    padding: 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  .settings-btn:hover {
    background: var(--glass-tile-hover);
    color: var(--text-secondary);
  }

  .hide-edge-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    padding: 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  body.widget-mode .hide-edge-btn {
    display: flex;
  }

  .hide-edge-btn:hover {
    background: var(--glass-tile-hover);
    color: var(--text-secondary);
  }

  body.widget-mode.edge-collapsed .app {
    margin: 0;
    padding: 0;
    min-height: 120px;
    border-radius: 14px;
    box-shadow:
      inset 0 1px 0 var(--glass-highlight),
      0 1px 2px var(--glass-edge),
      0 8px 20px -8px rgba(0, 0, 0, 0.35);
  }

  body.widget-mode.edge-collapsed .app-bg,
  body.widget-mode.edge-collapsed .app-header,
  body.widget-mode.edge-collapsed #settings-panel,
  body.widget-mode.edge-collapsed #cards-view {
    display: none !important;
  }

  body.widget-mode.edge-collapsed .edge-peek-tab {
    display: flex;
  }

  .edge-peek-tab {
    display: none;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 120px;
    padding: 10px 0;
    color: var(--text-secondary);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    -webkit-app-region: no-drag;
    cursor: pointer;
    user-select: none;
  }

  body.widget-mode.edge-collapsed.edge-left .app {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }

  body.widget-mode.edge-collapsed.edge-right .app {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }

  body.widget-mode.edge-collapsed.edge-left .edge-peek-tab::before {
    content: "›";
  }

  body.widget-mode.edge-collapsed.edge-right .edge-peek-tab::before {
    content: "‹";
  }

  #settings-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #settings-panel[hidden] {
    display: none !important;
  }

  #cards-view[hidden] {
    display: none !important;
  }

  .settings-section {
    padding: 10px 12px;
    border-radius: 14px;
    background: var(--glass-tile);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 var(--glass-highlight);
  }

  .settings-heading {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
  }

  .settings-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .provider-toggle + .provider-toggle {
    margin-top: 8px;
  }

  .provider-toggle.disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .provider-toggle-note {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .settings-back {
    align-self: flex-start;
    padding: 6px 12px;
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    background: var(--glass-tile);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  .settings-back:hover {
    background: var(--glass-tile-hover);
  }

  .tile {
    padding: 10px 12px;
    border-radius: 14px;
    background: var(--glass-tile);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    box-shadow: inset 0 1px 0 var(--glass-highlight);
    transition: background 0.2s ease;
  }

  .tile.has-detail {
    cursor: pointer;
  }

  .tile {
    user-select: none;
  }

  .tile.dragging {
    opacity: 0.45;
  }

  .tile:hover {
    background: var(--glass-tile-hover);
  }

  .tile-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .tile-identity {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: 1;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #claude-provider      .dot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--id-claude) 20%, transparent); }
  #codex-provider       .dot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--id-codex) 20%, transparent); }
  #antigravity-provider .dot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--id-antigravity) 20%, transparent); }
  #cursor-provider      .dot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--id-cursor) 20%, transparent); }

  .tile-label {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tile-value {
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: proportional-nums;
    flex-shrink: 0;
  }

  .chevron {
    width: 7px;
    height: 7px;
    margin-left: 10px;
    border-right: 1.5px solid var(--text-muted);
    border-bottom: 1.5px solid var(--text-muted);
    transform: rotate(45deg) translate(-2px, -2px);
    transition: transform 0.2s ease;
    flex-shrink: 0;
    display: none;
  }

  .tile.has-detail .chevron {
    display: inline-block;
  }

  .tile.expanded .chevron {
    transform: rotate(225deg);
  }

  /* Meter: fill carries severity; the unfilled track is a faint step of
     the same hue so state reads across the whole bar. */
  .meter {
    height: 8px;
    border-radius: 4px;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    overflow: hidden;
  }

  .meter.warning  { background: color-mix(in srgb, var(--warning) 18%, transparent); }
  .meter.critical { background: color-mix(in srgb, var(--critical) 18%, transparent); }

  .meter-fill {
    display: block;
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 45%, transparent);
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.3s ease;
  }

  .meter.warning .meter-fill {
    background: var(--warning);
    box-shadow: 0 0 10px color-mix(in srgb, var(--warning) 45%, transparent);
  }

  .meter.critical .meter-fill {
    background: var(--critical);
    box-shadow: 0 0 10px color-mix(in srgb, var(--critical) 45%, transparent);
  }

  .tile-sub {
    margin-top: 7px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.45;
    white-space: pre-line;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Expanded (accordion) detail view: replaces the summary meter/sub line. */
  .tile-detail {
    display: none;
  }

  .tile.expanded.has-detail .tile-detail {
    display: block;
    margin-top: 10px;
  }

  .tile.expanded.has-detail > .meter,
  .tile.expanded.has-detail .tile-sub {
    display: none;
  }

  .detail-row + .detail-row {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--glass-border);
  }

  .detail-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .detail-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    overflow-wrap: anywhere;
    margin-right: 10px;
  }

  .detail-value {
    font-size: 12.5px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .meter.meter-sm {
    height: 6px;
    border-radius: 3px;
  }

  .detail-sub {
    margin-top: 5px;
    font-size: 11.5px;
    color: var(--text-secondary);
  }

  /* Stale data (served from cache during a fetch failure) gets a third
     sub line saying when it was fetched. */
  .tile.stale .tile-sub {
    -webkit-line-clamp: 3;
  }

  .tile-empty {
    padding: 20px 12px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .tile-sub.error {
    color: var(--critical);
  }

  .tile.stale {
    border-left: 3px solid var(--warning);
  }

  .tile.error-state {
    border-left: 3px solid var(--critical);
  }

  .tile-status {
    margin-left: 6px;
    font-size: 11px;
    flex-shrink: 0;
    display: none;
  }

  .tile.stale .tile-status.stale-icon {
    display: inline;
  }

  .tile.error-state .tile-status.error-icon {
    display: inline;
  }

  .tile-hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .tile-hint[hidden] {
    display: none !important;
  }

  body.compact-mode .app {
    gap: 6px;
    padding: 10px;
  }

  body.compact-mode .app-updated {
    font-size: 9px;
  }

  body.compact-mode .tile {
    padding: 6px 10px;
  }

  body.compact-mode .tile-header {
    margin-bottom: 5px;
  }

  body.compact-mode .tile-label {
    font-size: 12px;
  }

  body.compact-mode .tile-value {
    font-size: 15px;
  }

  body.compact-mode .meter {
    height: 5px;
  }

  body.compact-mode .tile-sub {
    display: none;
  }

  body.compact-mode .tile.expanded.has-detail .tile-sub {
    display: -webkit-box;
  }

  @media (prefers-reduced-motion: reduce) {
    .tile, .meter-fill {
      transition: none;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="app-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <div class="edge-peek-tab" id="edge-peek-tab" title="Show widget"></div>

    <div class="app-header">
      <span class="app-title">AI Usage</span>
      <div class="app-header-actions">
        <span class="app-updated" id="last-updated"></span>
        <button type="button" id="hide-edge-btn" class="hide-edge-btn" aria-label="Hide to screen edge" title="Hide to screen edge">&#8250;</button>
        <button type="button" id="settings-btn" class="settings-btn" aria-label="Settings">&#9881;</button>
      </div>
    </div>

    <div id="settings-panel" hidden>
      <div class="settings-section">
        <label class="settings-row">
          <span>Compact mode</span>
          <input type="checkbox" id="compact-mode-toggle" />
        </label>
      </div>
      <div class="settings-section">
        <div class="settings-heading">Providers</div>
        <div id="provider-toggles"></div>
      </div>
      <button type="button" id="settings-back-btn" class="settings-back">Back</button>
    </div>

    <div id="cards-view">
    <div class="tile" id="claude-provider">
      <div class="tile-header">
        <span class="tile-identity">
          <span class="dot" style="background: var(--id-claude)"></span>
          <span class="tile-label">Claude</span>
          <span class="tile-status stale-icon" aria-hidden="true">&#9203;</span>
          <span class="tile-status error-icon" aria-hidden="true">&#9888;</span>
        </span>
        <span class="tile-value" id="claude-value">–</span>
        <span class="chevron"></span>
      </div>
      <div class="meter"><span class="meter-fill" id="claude-bar" style="width: 0%"></span></div>
      <div class="tile-sub" id="claude-reset">Loading…</div>
      <div class="tile-hint" id="claude-hint" hidden></div>
      <div class="tile-detail" id="claude-detail"></div>
    </div>

    <div class="tile" id="codex-provider">
      <div class="tile-header">
        <span class="tile-identity">
          <span class="dot" style="background: var(--id-codex)"></span>
          <span class="tile-label">Codex</span>
          <span class="tile-status stale-icon" aria-hidden="true">&#9203;</span>
          <span class="tile-status error-icon" aria-hidden="true">&#9888;</span>
        </span>
        <span class="tile-value" id="codex-value">–</span>
        <span class="chevron"></span>
      </div>
      <div class="meter"><span class="meter-fill" id="codex-bar" style="width: 0%"></span></div>
      <div class="tile-sub" id="codex-reset">Loading…</div>
      <div class="tile-hint" id="codex-hint" hidden></div>
      <div class="tile-detail" id="codex-detail"></div>
    </div>

    <div class="tile" id="antigravity-provider">
      <div class="tile-header">
        <span class="tile-identity">
          <span class="dot" style="background: var(--id-antigravity)"></span>
          <span class="tile-label">Antigravity</span>
          <span class="tile-status stale-icon" aria-hidden="true">&#9203;</span>
          <span class="tile-status error-icon" aria-hidden="true">&#9888;</span>
        </span>
        <span class="tile-value" id="antigravity-value">–</span>
        <span class="chevron"></span>
      </div>
      <div class="meter"><span class="meter-fill" id="antigravity-bar" style="width: 0%"></span></div>
      <div class="tile-sub" id="antigravity-reset">Loading…</div>
      <div class="tile-hint" id="antigravity-hint" hidden></div>
      <div class="tile-detail" id="antigravity-detail"></div>
    </div>

    <div class="tile" id="cursor-provider">
      <div class="tile-header">
        <span class="tile-identity">
          <span class="dot" style="background: var(--id-cursor)"></span>
          <span class="tile-label">Cursor</span>
          <span class="tile-status stale-icon" aria-hidden="true">&#9203;</span>
          <span class="tile-status error-icon" aria-hidden="true">&#9888;</span>
        </span>
        <span class="tile-value" id="cursor-value">–</span>
        <span class="chevron"></span>
      </div>
      <div class="meter"><span class="meter-fill" id="cursor-bar" style="width: 0%"></span></div>
      <div class="tile-sub" id="cursor-reset">Loading…</div>
      <div class="tile-hint" id="cursor-hint" hidden></div>
      <div class="tile-detail" id="cursor-detail"></div>
    </div>

    <div class="tile-empty" id="empty-state" hidden>
      No AI providers detected on this machine
    </div>
    </div>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('mode') === 'widget') {
      document.body.classList.add('widget-mode');
    }
  </script>
  <script src="renderer.js"></script>
</body>
</html>
