name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Compute release version
        id: version
        run: |
          VERSION="$(date -u +%Y.%-m.%-d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-args: --win
            artifact-name: windows
          - os: ubuntu-latest
            build-args: --linux
            artifact-name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Stamp package version
        run: npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - run: npm run dist -- ${{ matrix.build-args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
