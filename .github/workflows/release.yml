name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: ubuntu-latest
            build-args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run dist -- ${{ matrix.build-args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          fail_on_unmatched_files: false
